<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수꺾마 세로셈 원리 인포그래픽 포스터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [num1, setNum1] = useState(28);
            const [num2, setNum2] = useState(15);
            const [step, setStep] = useState(2); // 기본 단계를 '2. 받아올림'으로 설정

            const ones1 = num1 % 10;
            const tens1 = Math.floor(num1 / 10);
            const ones2 = num2 % 10;
            const tens2 = Math.floor(num2 / 10);

            const sumOnes = ones1 + ones2;
            const displayOnes = sumOnes % 10;
            const carry = sumOnes >= 10 ? 1 : 0;
            const sumTens = tens1 + tens2 + carry;

            const presets = [
                { n1: 28, n2: 15, label: '🍎 사과 (28 + 15)' },
                { n1: 37, n2: 26, label: '⭐ 도전 (37 + 26)' },
                { n1: 49, n2: 34, label: '🏆 마스터 (49 + 34)' }
            ];

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-8 flex flex-col items-center justify-start gap-6">
                    
                    {/* 상단 통합 연산판 상자 */}
                    <div className="w-full max-w-5xl bg-slate-900/40 border border-slate-800/80 rounded-2xl p-4 flex justify-between items-center px-6">
                        <span className="text-sm font-bold text-slate-400">실시간 연동 연산판</span>
                        <span className="text-xl font-black font-mono text-indigo-400">{num1} + {num2} = <span className="text-emerald-400">{num1 + num2}</span></span>
                    </div>

                    {/* 메인 2분할 콘텐츠 보드 */}
                    <main className="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
                        
                        {/* 왼쪽: 입체 수 모형 보드 */}
                        <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between min-h-[380px]">
                            <h2 className="text-sm font-bold text-slate-300 flex items-center gap-2 mb-4">
                                📦 입체 수 모형 보드
                            </h2>
                            
                            <div className="grid grid-cols-2 gap-4 bg-slate-950/60 border border-slate-900 rounded-2xl p-6 flex-grow items-start text-center relative">
                                {/* 십의 자리 모형 구역 */}
                                <div className="border-r border-slate-800/60 h-full pr-2">
                                    <span className="inline-block bg-indigo-950 text-indigo-400 text-xs font-bold px-2.5 py-1 rounded-md mb-4">
                                        십의 자리 ({step === 3 ? sumTens : tens1 + tens2})
                                    </span>
                                    <div className="flex justify-center gap-1.5 pt-2">
                                        {/* 기존 십 모형들 */}
                                        {[...Array(tens1 + tens2)].map((_, i) => (
                                            <div key={i} className="w-3 h-20 bg-indigo-600 rounded-sm border border-indigo-400/30 shadow-md shadow-indigo-600/20" />
                                        ))}
                                        {/* 받아올림으로 새로 이사 온 십 모형 */}
                                        {step >= 2 && carry === 1 && (
                                            <div className="w-3 h-20 bg-amber-500 rounded-sm border border-amber-300/50 shadow-md shadow-amber-500/40 animate-pulse" />
                                        )}
                                    </div>
                                </div>

                                {/* 일의 자리 모형 구역 */}
                                <div>
                                    <span className="inline-block bg-yellow-950 text-yellow-400 text-xs font-bold px-2.5 py-1 rounded-md mb-4">
                                        일의 자리 ({step >= 1 ? displayOnes : sumOnes})
                                    </span>
                                    <div className="flex flex-wrap justify-center gap-1.5 max-w-[140px] mx-auto pt-4">
                                        {step >= 1 ? (
                                            // 일의 자리 계산 이후 남은 낱개 모형
                                            [...Array(displayOnes)].map((_, i) => (
                                                <div key={i} className="w-4 h-4 bg-yellow-400 rounded-sm border border-yellow-200/30" />
                                            ))
                                        ) : (
                                            // 낱개 모형 전체 합친 상태
                                            [...Array(sumOnes)].map((_, i) => (
                                                <div key={i} className="w-4 h-4 bg-yellow-400 rounded-sm border border-yellow-200/30" />
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-2 text-[11px] text-slate-500 justify-center mt-3">
                                <div className="flex items-center gap-1"><div className="w-2 h-2 bg-indigo-600 rounded-sm"/> 십 모형 (10)</div>
                                <div className="flex items-center gap-1"><div className="w-2 h-2 bg-yellow-400 rounded-sm"/> 일 모형 (1)</div>
                            </div>
                        </div>

                        {/* 오른쪽: 세로셈 실시간 판서 (격자 충돌 완벽 해결 버전) */}
                        <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between min-h-[380px] items-center">
                            <h3 className="text-sm font-bold text-slate-300 w-full text-left mb-4 flex items-center gap-2">
                                🔟 세로셈 실시간 판서
                            </h3>

                            {/* [핵심 패치]: grid-cols를 4열로 구성하여 1열은 오직 부호(+) 전용 방으로 격리 */}
                            <div className="relative bg-slate-950 p-6 py-8 rounded-2xl border border-slate-800/80 w-full max-w-[260px] font-mono text-5xl font-black tracking-widest select-none flex justify-center shadow-inner">
                                
                                {/* 갈색 받아올림 기둥 배경: 2열(십의 자리) 위치에만 완벽히 매핑 (left 값 정밀 조정) */}
                                <div className="absolute top-4 bottom-4 left-[4.2rem] w-14 bg-amber-950/40 border border-amber-900/30 rounded-full pointer-events-none z-0 flex flex-col justify-between items-center py-10 text-amber-500/30 text-xs font-sans font-bold">
                                    <div>받</div><div>아</div><div>올</div><div>림</div>
                                </div>

                                <div className="grid grid-cols-[2rem_3rem_0.5rem_3rem] items-center justify-items-center gap-y-3 w-full z-10 pr-1">
                                    
                                    {/* 0행: 받아올림 숫자 1 */}
                                    <div></div>
                                    <div className="h-8 flex items-center justify-center">
                                        {step >= 2 && carry === 1 && (
                                            <span id="carry-indicator" className="text-xl font-bold bg-amber-500 text-slate-950 w-7 h-7 rounded-full flex items-center justify-center border border-amber-300 shadow animate-bounce">
                                                1
                                            </span>
                                        )}
                                    </div>
                                    <div></div>
                                    <div></div>

                                    {/* 1행: 첫 번째 수의 십의 자리 / 일의 자리 */}
                                    <div></div>
                                    <div className="text-indigo-400">{tens1}</div>
                                    <div></div>
                                    <div className="text-yellow-400">{ones1}</div>

                                    {/* 2행: 초록색 덧셈 기호(+) 및 두 번째 수 */}
                                    {/* 수정 내용: 1열인 부호 전용 칸에 배치하여 2열인 숫자 1의 왼쪽으로 완벽 분리 */}
                                    <div className="text-emerald-400 text-4xl font-sans font-bold w-full text-left pl-1 select-none flex items-center justify-start group">+</div>
                                    <div className="text-indigo-400">{tens2}</div>
                                    <div></div>
                                    <div className="text-yellow-400">{ones2}</div>

                                    {/* 3행: 세로셈 마감 경계선 */}
                                    <div className="col-span-4 w-full border-b-4 border-slate-700 my-1"></div>

                                    {/* 4행: 최종 연산 결과 행 */}
                                    <div></div>
                                    <div className="h-12 flex items-center justify-center">
                                        {step === 3 ? (
                                            <span className="text-indigo-400 font-extrabold">{sumTens}</span>
                                        ) : (
                                            <span className="text-slate-800 text-3xl">.</span>
                                        )}
                                    </div>
                                    <div></div>
                                    <div className="h-12 flex items-center justify-center">
                                        {step >= 1 ? (
                                            <span className="text-yellow-400">{displayOnes}</span>
                                        ) : (
                                            <span className="text-slate-800 text-3xl">.</span>
                                        )}
                                    </div>

                                </div>
                            </div>

                            {/* 실시간 단계 설명 텍스트 배너 */}
                            <div className="w-full bg-slate-950 border border-slate-900 rounded-xl py-2.5 px-4 text-center text-xs font-medium text-slate-300 mt-4 min-h-[40px] flex items-center justify-center">
                                {step === 0 && "0단계: 자릿수를 맞춰 숫자를 예쁘게 적어줍니다."}
                                {step === 1 && `1단계: 일의 자리 ${ones1}+${ones2}=${sumOnes}이므로 밑에 ${displayOnes}을 적어요.`}
                                {step === 2 && "2단계: 일의 자리에서 넘친 10은 십의 자리 위로 '1'이 되어 이사 가요!"}
                                {step === 3 && `3단계: 받아올림된 1과 십의 자리 숫자를 모두 더해 ${sumTens}을 적으면 완성!`}
                            </div>
                        </div>
                    </main>

                    {/* 하단 단원 원리 재생기 컨트롤러 바 */}
                    <div className="w-full max-w-5xl bg-slate-900/60 border border-slate-800 rounded-2xl p-4 flex flex-col items-center gap-3">
                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">🧬 단원 원리 단계별 재생기</span>
                        <div className="grid grid-cols-4 gap-2 w-full max-w-xl">
                            {[
                                { id: 0, label: '0. 준비' },
                                { id: 1, label: '1. 일의 자리' },
                                { id: 2, label: '2. 받아올림' },
                                { id: 3, label: '3. 십의 자리' }
                            ].map((btn) => (
                                <button
                                    key={btn.id}
                                    onClick={() => setStep(btn.id)}
                                    className={`py-2 px-1 text-xs font-bold rounded-xl transition-all cursor-pointer ${step === btn.id ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/30' : 'bg-slate-950 text-slate-400 hover:bg-slate-800 border border-slate-900'}`}
                                >
                                    {btn.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 수 변경 테스트용 프리셋 링크 */}
                    <div className="flex gap-2 mt-2">
                        {presets.map((p, idx) => (
                            <button
                                key={idx}
                                onClick={() => { setNum1(p.n1); setNum2(p.n2); setStep(0); }}
                                className="text-[10px] bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 px-3 py-1 rounded-md transition-all cursor-pointer"
                            >
                                {p.label}
                            </button>
                        ))}
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
